spring.application.name=backend
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=5
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

app.auth.jwt.secret=${JWT_SECRET}
app.auth.jwt.ttl-seconds=${JWT_TTL_SECONDS:86400}

app.auth.google.web-client-id=${GOOGLE_WEB_CLIENT_ID}
app.auth.google.ios-client-id=${GOOGLE_IOS_CLIENT_ID:}
app.auth.google.android-client-id=${GOOGLE_ANDROID_CLIENT_ID:}

app.auth.github.client-id=${GITHUB_CLIENT_ID}
app.auth.github.client-secret=${GITHUB_CLIENT_SECRET}

app.auth.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006}