spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop

# Dummy OAuth/JWT config so the auth beans can construct in the test context.
# These are NOT real credentials. This file shadows main's application.properties
# during tests, so we set the final app.auth.* values directly.
app.auth.jwt.secret=test-secret-at-least-32-bytes-long-padding-padding-padding
app.auth.jwt.ttl-seconds=86400
app.auth.google.web-client-id=test-google-client-id
app.auth.google.ios-client-id=
app.auth.google.android-client-id=
app.auth.github.client-id=test-github-client-id
app.auth.github.client-secret=test-github-client-secret
app.auth.cors.allowed-origins=http://localhost:8081